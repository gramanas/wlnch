name: Build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: dind
    container:
      image: archlinux:base

    steps:
      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm --needed \
            git \
            base-devel \
            wayland \
            libxkbcommon \
            freetype2 \
            fontconfig \
            pkg-config

      - name: Checkout
        run: |
          git clone --depth=1 "$FORGEJO_SERVER_URL/$FORGEJO_REPOSITORY" src
          cd src
          git fetch --depth=1 origin "$FORGEJO_SHA"
          git checkout "$FORGEJO_SHA"

      - name: Build
        working-directory: src
        run: make

      - name: Upload artifacts
        working-directory: src
        run: |
          for bin in wlnch wout wnpt; do
            curl -s --fail \
              -H "Authorization: token $FORGEJO_TOKEN" \
              -F "file=@${bin}" \
              "$FORGEJO_SERVER_URL/api/v1/repos/$FORGEJO_REPOSITORY/releases/assets"
          done
