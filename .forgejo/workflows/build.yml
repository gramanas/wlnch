name: Build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: dind
    container:
      image: archlinux:base

    steps:
      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm --needed \
            git \
            base-devel \
            wayland \
            libxkbcommon \
            freetype2 \
            fontconfig \
            pkg-config \
            nodejs

#      - name: Checkout
#        run: |
#          git clone --depth=1 \
#            "https://forgejo-actions:${FORGEJO_TOKEN}@${FORGEJO_SERVER_URL#https://}/$FORGEJO_REPOSITORY" \
#            src
#          cd src
#          git fetch --depth=1 origin "$FORGEJO_SHA"
#          git checkout "$FORGEJO_SHA"

      - name: Checkout
        uses: actions/checkout@v6

      - name: Build
        run: make

      - name: Prepare release
        run: |
          mkdir -p dist/release
          cp wlnch wout wnpt dist/release/

      - name: Publish release
        uses: actions/forgejo-release@v2
        with:
          direction: upload
          url: ${{ env.FORGEJO_SERVER_URL }}
          release-dir: dist/release
          release-notes: "Build from ${{ forgejo.sha }}"
          token: ${{ secrets.FORGEJO_TOKEN }}


