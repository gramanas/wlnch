name: Build

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: dind
    container:
      image: archlinux:base

    steps:
      - name: Install dependencies
        run: |
          pacman -Sy --noconfirm --needed \
            git \
            base-devel \
            wayland \
            libxkbcommon \
            freetype2 \
            fontconfig \
            pkg-config \
            nodejs

#      - name: Checkout
#        run: |
#          git clone --depth=1 \
#            "https://forgejo-actions:${FORGEJO_TOKEN}@${FORGEJO_SERVER_URL#https://}/$FORGEJO_REPOSITORY" \
#            src
#          cd src
#          git fetch --depth=1 origin "$FORGEJO_SHA"
#          git checkout "$FORGEJO_SHA"

      - name: Checkout
        uses: actions/checkout@v6


      - name: Build
        run: make

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries
          path: |
            wlnch
            wout
            wnpt

